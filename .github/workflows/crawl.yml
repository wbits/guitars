# Cognito crawler user: info@wbits.net (COGNITO_CRAWLER_USERNAME secret).
# Password: COGNITO_CRAWLER_PASSWORD must match the Cognito user (see README).
name: Market crawl

on:
  push:
    branches: [master]
    paths:
      - 'cmd/crawler/**'
      - 'internal/marketcrawler/**'
      - '.github/workflows/crawl.yml'
  schedule:
    # Every Sunday at 06:00 UTC.
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      guitar_id:
        description: Optional single guitar id to crawl
        required: false
        type: string

concurrency:
  group: market-crawl
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GUITARS_API_URL: ${{ vars.GUITARS_API_URL }}
      COGNITO_REGION: ${{ vars.COGNITO_REGION || 'eu-central-1' }}
      COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
      COGNITO_USERNAME: ${{ secrets.COGNITO_CRAWLER_USERNAME }}
      COGNITO_PASSWORD: ${{ secrets.COGNITO_CRAWLER_PASSWORD }}
      REVERB_API_TOKEN: ${{ secrets.REVERB_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test crawler packages
        run: go test ./internal/marketcrawler/...

      - name: Validate crawl configuration
        run: |
          set -euo pipefail
          if [ -z "${GUITARS_API_URL:-}" ]; then
            echo "::error::Set the GUITARS_API_URL repository variable to your production API base URL."
            exit 1
          fi
          if [ -z "${COGNITO_CLIENT_ID:-}" ]; then
            echo "::error::Set the COGNITO_CLIENT_ID repository variable."
            exit 1
          fi
          if [ -z "${COGNITO_USERNAME:-}" ]; then
            echo "::error::Set the COGNITO_CRAWLER_USERNAME repository secret (e.g. info@wbits.net)."
            exit 1
          fi
          if [ -z "${COGNITO_PASSWORD:-}" ]; then
            echo "::error::Set the COGNITO_CRAWLER_PASSWORD repository secret to match the Cognito user password."
            exit 1
          fi
          if [ -z "${REVERB_API_TOKEN:-}" ]; then
            echo "::error::Set the REVERB_API_TOKEN repository secret (Reverb personal access token with public scope)."
            exit 1
          fi

      - name: Verify Cognito sign-in
        run: |
          set -euo pipefail
          aws cognito-idp initiate-auth \
            --region "${COGNITO_REGION}" \
            --client-id "${COGNITO_CLIENT_ID}" \
            --auth-flow USER_PASSWORD_AUTH \
            --auth-parameters "USERNAME=${COGNITO_USERNAME},PASSWORD=${COGNITO_PASSWORD}" \
            --query 'AuthenticationResult.TokenType' --output text

      - name: Run market crawler
        run: |
          set -euo pipefail
          ARGS=(-skip-ebay -skip-marktplaats)
          if [ -n "${{ github.event.inputs.guitar_id }}" ]; then
            ARGS+=("-guitar-id=${{ github.event.inputs.guitar_id }}")
          fi
          go run ./cmd/crawler "${ARGS[@]}"
