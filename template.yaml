---
AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31

Description: >
  GuitarCollection API: a personal guitar collection exposed via API Gateway,
  backed by a Go Lambda function and a DynamoDB table. Requests are
  authenticated with Cognito-issued JWT bearer tokens.

Parameters:
  TableName:
    Type: String
    Default: Guitars
    Description: DynamoDB table name that holds the guitars.
  MarketLogsTableName:
    Type: String
    Default: MarketLogs
    Description: DynamoDB table name that holds marketplace price observations.
  UserProfilesTableName:
    Type: String
    Default: UserProfiles
    Description: DynamoDB table name that holds user profile records.
  AssistantUsageTableName:
    Type: String
    Default: AssistantUsage
    Description: DynamoDB table for hosted assistant daily rate limits.
  GuitarAnalysisTableName:
    Type: String
    Default: GuitarAnalysis
    Description: DynamoDB table for AI photo analysis metadata.
  AssistantDailyLimit:
    Type: Number
    Default: 10
    Description: Max viewer assistant messages per authenticated user per day (tier 1).
  AssistantBYOKDailyLimit:
    Type: Number
    Default: 200
    Description: Max assistant messages per day when using owner BYOK on own collection (tier 2).
  AssistantBYOKEncryptionKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Base64-encoded 32-byte AES key for encrypting owner BYOK API keys at rest. Leave empty to disable BYOK storage.
  ApiDomainName:
    Type: String
    Default: guitars.brouwers.club
    Description: Custom domain name for the GuitarCollection API.
  HostedZoneId:
    Type: String
    Default: Z0268167UNCHL7FC13KG
    Description: Route53 hosted zone ID for the API custom domain.
  ImagesBucketName:
    Type: String
    Default: ""
    Description: >
      S3 bucket for guitar pictures (typically the guitars-webapp static site
      bucket). Leave empty to disable presigned uploads.
  ImagesCdnBaseUrl:
    Type: String
    Default: https://guitarcollection.brouwers.club
    Description: Public CDN origin for uploaded guitar pictures.

Globals:
  Api:
    EndpointConfiguration: REGIONAL
  Function:
    Runtime: provided.al2
    Architectures: [x86_64]
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        GUITARS_TABLE: !Ref TableName
        MARKET_LOGS_TABLE: !Ref MarketLogsTableName
        USER_PROFILES_TABLE: !Ref UserProfilesTableName
        GUITAR_ANALYSIS_TABLE: !Ref GuitarAnalysisTableName
        ASSISTANT_USAGE_TABLE: !Ref AssistantUsageTableName
        ASSISTANT_DAILY_LIMIT: !Ref AssistantDailyLimit
        ASSISTANT_BYOK_DAILY_LIMIT: !Ref AssistantBYOKDailyLimit
        ASSISTANT_BYOK_ENCRYPTION_KEY: !Ref AssistantBYOKEncryptionKey
        AWS_ENDPOINT_URL: ""
        COGNITO_USER_POOL_ID: !Ref GuitarsUserPool
        COGNITO_CLIENT_ID: !Ref GuitarsUserPoolClient
        IMAGES_BUCKET: !Ref ImagesBucketName
        IMAGES_CDN_BASE_URL: !Ref ImagesCdnBaseUrl
        IMAGES_S3_PUBLIC_ENDPOINT: ""
        MARKET_CRAWLER_EMAIL: info@wbits.net
        MARKET_CRAWLER_USER_ID: a3f4b8a2-d0e1-70a1-6ffb-287e81a377c0
        ADMIN_GROUP: guitars-admins

Conditions:
  HasImagesBucket: !Not [!Equals [!Ref ImagesBucketName, ""]]

Resources:

  GuitarsUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: guitars
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  GuitarsUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: guitars-webapp
      UserPoolId: !Ref GuitarsUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO

  GuitarsUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "guitars-${AWS::AccountId}"
      UserPoolId: !Ref GuitarsUserPool

  GuitarsAdminsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: guitars-admins
      UserPoolId: !Ref GuitarsUserPool
      Description: Administrators who can manage market crawl settings for collections

  GuitarsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  MarketLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref MarketLogsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: guitarId
          AttributeType: S
        - AttributeName: observedAt
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: guitarIdIndex
          KeySchema:
            - AttributeName: guitarId
              KeyType: HASH
            - AttributeName: observedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  UserProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref UserProfilesTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: usernameIndex
          KeySchema:
            - AttributeName: username
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  AssistantUsageTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref AssistantUsageTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  GuitarAnalysisTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref GuitarAnalysisTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: guitarId
          AttributeType: S
      KeySchema:
        - AttributeName: guitarId
          KeyType: HASH

  GuitarAnalysisDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  GuitarAnalysisQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt GuitarAnalysisDLQ.Arn
        maxReceiveCount: 3

  GuitarsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: bootstrap
      CodeUri: ./build/
      Environment:
        Variables:
          GUITAR_ANALYSIS_QUEUE_URL: !Ref GuitarAnalysisQueue
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - DynamoDBCrudPolicy:
            TableName: !Ref MarketLogsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfilesTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref AssistantUsageTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref GuitarAnalysisTableName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt GuitarAnalysisQueue.QueueName
        - !If
          - HasImagesBucket
          - Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:aws:s3:::${ImagesBucketName}/images/guitars/*'
                  - !Sub 'arn:aws:s3:::${ImagesBucketName}/images/market-logs/*'
          - !Ref AWS::NoValue
      Events:
        ListGuitars:
          Type: Api
          Properties:
            Path: /guitar
            Method: get
        CreateGuitar:
          Type: Api
          Properties:
            Path: /guitar
            Method: post
        GetGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}
            Method: get
        UpdateGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}
            Method: put
        DeleteGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}
            Method: delete
        OptionsGuitarCollection:
          Type: Api
          Properties:
            Path: /guitar
            Method: options
        OptionsGuitarItem:
          Type: Api
          Properties:
            Path: /guitar/{id}
            Method: options
        PresignUpload:
          Type: Api
          Properties:
            Path: /upload/presign
            Method: post
        OptionsPresignUpload:
          Type: Api
          Properties:
            Path: /upload/presign
            Method: options
        ListMarketLogs:
          Type: Api
          Properties:
            Path: /guitar/{id}/market-log
            Method: get
        CreateMarketLogs:
          Type: Api
          Properties:
            Path: /guitar/{id}/market-log
            Method: post
        OptionsMarketLogs:
          Type: Api
          Properties:
            Path: /guitar/{id}/market-log
            Method: options
        GetMe:
          Type: Api
          Properties:
            Path: /me
            Method: get
        PatchMe:
          Type: Api
          Properties:
            Path: /me
            Method: patch
        OptionsMe:
          Type: Api
          Properties:
            Path: /me
            Method: options
        PutAssistantBYOK:
          Type: Api
          Properties:
            Path: /me/assistant-byok
            Method: put
        DeleteAssistantBYOK:
          Type: Api
          Properties:
            Path: /me/assistant-byok
            Method: delete
        OptionsAssistantBYOK:
          Type: Api
          Properties:
            Path: /me/assistant-byok
            Method: options
        ReanalyzeCollection:
          Type: Api
          Properties:
            Path: /me/reanalyze-collection
            Method: post
        OptionsReanalyzeCollection:
          Type: Api
          Properties:
            Path: /me/reanalyze-collection
            Method: options
        AnalyzePhoto:
          Type: Api
          Properties:
            Path: /me/analyze-photo
            Method: post
        OptionsAnalyzePhoto:
          Type: Api
          Properties:
            Path: /me/analyze-photo
            Method: options
        AnalyzeGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}/analyze
            Method: post
        OptionsAnalyzeGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}/analyze
            Method: options
        HideGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}/hide
            Method: post
        OptionsHideGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}/hide
            Method: options
        ShowGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}/show
            Method: post
        OptionsShowGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}/show
            Method: options
        ListCollections:
          Type: Api
          Properties:
            Path: /collections
            Method: get
        OptionsCollections:
          Type: Api
          Properties:
            Path: /collections
            Method: options
        ListUserCollection:
          Type: Api
          Properties:
            Path: /collections/{userId}/guitar
            Method: get
        OptionsUserCollection:
          Type: Api
          Properties:
            Path: /collections/{userId}/guitar
            Method: options
        PatchCollectionMarketCrawl:
          Type: Api
          Properties:
            Path: /collections/{userId}/market-crawl
            Method: patch
        OptionsCollectionMarketCrawl:
          Type: Api
          Properties:
            Path: /collections/{userId}/market-crawl
            Method: options
        DeleteCollectionMarketLogs:
          Type: Api
          Properties:
            Path: /collections/{userId}/market-log
            Method: delete
        OptionsCollectionMarketLogs:
          Type: Api
          Properties:
            Path: /collections/{userId}/market-log
            Method: options
        AssistantChat:
          Type: Api
          Properties:
            Path: /assistant/chat
            Method: post
        OptionsAssistantChat:
          Type: Api
          Properties:
            Path: /assistant/chat
            Method: options

  GuitarAnalysisWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: bootstrap
      CodeUri: ./build/worker/
      Timeout: 120
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfilesTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref GuitarAnalysisTableName
        - SQSPollerPolicy:
            QueueName: !GetAtt GuitarAnalysisQueue.QueueName
      Events:
        AnalysisQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt GuitarAnalysisQueue.Arn
            BatchSize: 1

  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref ApiDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref ApiDomainName
          HostedZoneId: !Ref HostedZoneId

  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref ApiDomainName
      RegionalCertificateArn: !Ref ApiCertificate
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn:
      - ApiCustomDomain
      - ServerlessRestApiProdStage
    Properties:
      DomainName: !Ref ApiDomainName
      RestApiId: !Ref ServerlessRestApi
      Stage: Prod

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

  ApiDnsRecordIPv6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

Outputs:
  Endpoint:
    Description: Invoke URL for the GuitarCollection API.
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  CustomDomainEndpoint:
    Description: Custom domain URL for the GuitarCollection API.
    Value: !Sub "https://${ApiDomainName}/"
  ApiDomainName:
    Description: Custom domain name attached to the API.
    Value: !Ref ApiDomainName
  CognitoUserPoolId:
    Description: Cognito user pool ID for the GuitarCollection API.
    Value: !Ref GuitarsUserPool
  CognitoUserPoolClientId:
    Description: Cognito app client ID for the guitars webapp.
    Value: !Ref GuitarsUserPoolClient
  CognitoIssuer:
    Description: JWT issuer URL for Cognito access and ID tokens.
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${GuitarsUserPool}"
  CognitoHostedUIUrl:
    Description: Cognito hosted UI base URL for sign-in.
    Value: !Sub "https://${GuitarsUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com"
  TableName:
    Description: DynamoDB table used by the GuitarCollection API.
    Value: !Ref GuitarsTable
  MarketLogsTableName:
    Description: DynamoDB table used for marketplace price observations.
    Value: !Ref MarketLogsTable
  UserProfilesTableName:
    Description: DynamoDB table used for user profile records.
    Value: !Ref UserProfilesTable
