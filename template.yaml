---
AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31

Description: >
  GuitarCollection API: a personal guitar collection exposed via API Gateway,
  backed by a Go Lambda function and a DynamoDB table. Requests are
  authenticated with Cognito-issued JWT bearer tokens.

Parameters:
  TableName:
    Type: String
    Default: Guitars
    Description: DynamoDB table name that holds the guitars.
  ApiDomainName:
    Type: String
    Default: guitars.brouwers.club
    Description: Custom domain name for the GuitarCollection API.
  HostedZoneId:
    Type: String
    Default: Z0268167UNCHL7FC13KG
    Description: Route53 hosted zone ID for the API custom domain.
  ImagesBucketName:
    Type: String
    Default: ""
    Description: >
      S3 bucket for guitar pictures (typically the guitars-webapp static site
      bucket). Leave empty to disable presigned uploads.
  ImagesCdnBaseUrl:
    Type: String
    Default: https://guitarcollection.brouwers.club
    Description: Public CDN origin for uploaded guitar pictures.

Globals:
  Api:
    EndpointConfiguration: REGIONAL
  Function:
    Runtime: provided.al2
    Architectures: [x86_64]
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        GUITARS_TABLE: !Ref TableName
        AWS_ENDPOINT_URL: ""
        COGNITO_USER_POOL_ID: !Ref GuitarsUserPool
        COGNITO_CLIENT_ID: !Ref GuitarsUserPoolClient
        IMAGES_BUCKET: !Ref ImagesBucketName
        IMAGES_CDN_BASE_URL: !Ref ImagesCdnBaseUrl

Conditions:
  HasImagesBucket: !Not [!Equals [!Ref ImagesBucketName, ""]]

Resources:

  GuitarsUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: guitars
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  GuitarsUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: guitars-webapp
      UserPoolId: !Ref GuitarsUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO

  GuitarsUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "guitars-${AWS::AccountId}"
      UserPoolId: !Ref GuitarsUserPool

  GuitarsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  GuitarsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: bootstrap
      CodeUri: ./build/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - !If
          - HasImagesBucket
          - Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${ImagesBucketName}/images/guitars/*'
          - !Ref AWS::NoValue
      Events:
        ListGuitars:
          Type: Api
          Properties:
            Path: /guitar
            Method: get
        CreateGuitar:
          Type: Api
          Properties:
            Path: /guitar
            Method: post
        GetGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}
            Method: get
        UpdateGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}
            Method: put
        DeleteGuitar:
          Type: Api
          Properties:
            Path: /guitar/{id}
            Method: delete
        OptionsGuitarCollection:
          Type: Api
          Properties:
            Path: /guitar
            Method: options
        OptionsGuitarItem:
          Type: Api
          Properties:
            Path: /guitar/{id}
            Method: options
        PresignUpload:
          Type: Api
          Properties:
            Path: /upload/presign
            Method: post
        OptionsPresignUpload:
          Type: Api
          Properties:
            Path: /upload/presign
            Method: options

  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref ApiDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref ApiDomainName
          HostedZoneId: !Ref HostedZoneId

  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref ApiDomainName
      RegionalCertificateArn: !Ref ApiCertificate
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn:
      - ApiCustomDomain
      - ServerlessRestApiProdStage
    Properties:
      DomainName: !Ref ApiDomainName
      RestApiId: !Ref ServerlessRestApi
      Stage: Prod

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

  ApiDnsRecordIPv6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

Outputs:
  Endpoint:
    Description: Invoke URL for the GuitarCollection API.
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  CustomDomainEndpoint:
    Description: Custom domain URL for the GuitarCollection API.
    Value: !Sub "https://${ApiDomainName}/"
  ApiDomainName:
    Description: Custom domain name attached to the API.
    Value: !Ref ApiDomainName
  CognitoUserPoolId:
    Description: Cognito user pool ID for the GuitarCollection API.
    Value: !Ref GuitarsUserPool
  CognitoUserPoolClientId:
    Description: Cognito app client ID for the guitars webapp.
    Value: !Ref GuitarsUserPoolClient
  CognitoIssuer:
    Description: JWT issuer URL for Cognito access and ID tokens.
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${GuitarsUserPool}"
  CognitoHostedUIUrl:
    Description: Cognito hosted UI base URL for sign-in.
    Value: !Sub "https://${GuitarsUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com"
  TableName:
    Description: DynamoDB table used by the GuitarCollection API.
    Value: !Ref GuitarsTable
