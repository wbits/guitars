# golangci-lint v2 configuration.
# See https://golangci-lint.run/docs/linters/
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - misspell
    - noctx
  exclusions:
    rules:
      # Main packages are thin wiring; coverage is enforced on internal/ instead.
      - path: cmd/
        linters:
          - errcheck
